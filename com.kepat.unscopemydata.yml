Summary: Sync protected Android folders to public storage using Shizuku.
Description: |-
  UnscopeMyData is an Android utility designed to help users bypass "Scoped Storage" 
  limitations for specific app data folders. It uses Shizuku to perform elevated 
  filesystem operations, allowing you to sync data between protected /Android/data/ 
  directories and a public "Unscoped" directory on your internal storage.

  Features:
  - Scoped Storage Bypass: Access and sync folders usually restricted by Android.
  - Shizuku Integration: Uses a system-level privileged process for file operations.
  - Portable Folder: Easily transfer data via Syncthing, manual copy, or other services.

